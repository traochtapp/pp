<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>多 Agent 实时共享讨论室</title>
  <style>
    :root {
      color-scheme: light dark;
      --page: Canvas;
      --text: CanvasText;
      --muted: GrayText;
      --line: color-mix(in srgb, CanvasText 15%, Canvas);
      --soft: color-mix(in srgb, Highlight 10%, Canvas);
      --accent: Highlight;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      background: var(--page);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main { width: min(760px, 100%); margin: 0 auto; }
    header {
      display: grid;
      gap: 12px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }
    .room-state, .room-meta, .role-list, .turn-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .room-state { justify-content: space-between; }
    h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }
    .status { display: inline-flex; align-items: center; gap: 7px; color: var(--muted); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    body[data-live="true"] .status-dot { animation: pulse 1.2s ease-in-out infinite; }
    .topic { margin: 0; font-weight: 500; }
    .role, .action {
      display: inline-flex;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--soft);
    }
    .count, .reply, .sequence { color: var(--muted); font-size: .82rem; }
    ol {
      position: relative;
      display: grid;
      gap: 20px;
      margin: 0;
      padding: 22px 0 40px;
      list-style: none;
    }
    ol::before {
      content: "";
      position: absolute;
      top: 38px;
      bottom: 40px;
      left: 18px;
      width: 1px;
      background: var(--line);
    }
    .turn {
      position: relative;
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
      animation: enter 180ms ease-out;
    }
    .avatar {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--accent) 14%, var(--page));
      font-weight: 600;
    }
    .speaker { font-weight: 600; }
    .action { font-size: .78rem; }
    .reply { margin: 5px 0 0; }
    .message { margin: 6px 0 0; line-height: 1.7; white-space: pre-wrap; }
    .empty { padding: 32px 0; color: var(--muted); }
    @keyframes pulse { 0%, 100% { opacity: .35; } 50% { opacity: 1; } }
    @keyframes enter { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @media (prefers-reduced-motion: reduce) {
      body[data-live="true"] .status-dot, .turn { animation: none; }
    }
    @media (max-width: 520px) {
      body { padding: 18px; }
      .room-state { align-items: flex-start; }
    }
  </style>
</head>
<body data-live="false">
  <main>
    <header>
      <div class="room-state">
        <h1>共享讨论区</h1>
        <span class="status"><span class="status-dot" aria-hidden="true"></span><span id="status">连接中</span></span>
      </div>
      <p class="topic" id="topic">等待新议题</p>
      <div class="room-meta">
        <div class="role-list" id="roles" aria-label="在场角色"></div>
        <span class="count" id="count">0 条公开发言</span>
      </div>
    </header>
    <p class="empty" id="empty">专家正在建立独立判断锚点，公开发言会逐条出现在这里。</p>
    <ol id="transcript" aria-live="polite" aria-label="公开讨论记录"></ol>
  </main>
  <script>
    const topic = document.getElementById('topic');
    const status = document.getElementById('status');
    const roles = document.getElementById('roles');
    const count = document.getElementById('count');
    const empty = document.getElementById('empty');
    const transcript = document.getElementById('transcript');
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const escapeHtml = (value) => String(value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');

    const setStatus = (value) => {
      status.textContent = value;
      document.body.dataset.live = String(!['暂定共识', '已暂停', '讨论完成'].includes(value));
    };

    const updateCount = () => {
      count.textContent = `${transcript.children.length} 条公开发言`;
      empty.hidden = transcript.children.length > 0;
    };

    const appendTurn = (turn, scroll = true) => {
      const item = document.createElement('li');
      item.className = 'turn';
      item.innerHTML = `
        <span class="avatar" aria-hidden="true">${escapeHtml(turn.avatar || '·')}</span>
        <div>
          <div class="turn-meta">
            <span class="speaker">${escapeHtml(turn.speaker)}</span>
            <span class="action">${escapeHtml(turn.action || '发言')}</span>
            <span class="sequence">${String(turn.sequence || transcript.children.length + 1).padStart(2, '0')}</span>
          </div>
          ${turn.reply ? `<p class="reply">${escapeHtml(turn.reply)}</p>` : ''}
          <p class="message">${escapeHtml(turn.message)}</p>
        </div>`;
      transcript.appendChild(item);
      updateCount();
      if (scroll) item.scrollIntoView({ behavior: reducedMotion ? 'auto' : 'smooth', block: 'end' });
    };

    const applySnapshot = (room) => {
      topic.textContent = room.topic || '未命名议题';
      setStatus(room.status || '准备中');
      roles.innerHTML = (room.roles || []).map((role) => `<span class="role">${escapeHtml(role)}</span>`).join('');
      transcript.replaceChildren();
      for (const turn of room.turns || []) appendTurn(turn, false);
      updateCount();
    };

    const events = new EventSource('/events');
    events.addEventListener('snapshot', (event) => applySnapshot(JSON.parse(event.data)));
    events.addEventListener('turn', (event) => {
      const payload = JSON.parse(event.data);
      appendTurn(payload.turn, true);
      setStatus(payload.status || '讨论进行中');
    });
    events.addEventListener('status', (event) => setStatus(JSON.parse(event.data).status));
    events.onerror = () => setStatus('等待重新连接');
  </script>
</body>
</html>
